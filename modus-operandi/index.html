<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Я, Творец, Свят Благословен Он — Зеир Арихович Анпин</title>
<meta name="description" content="Я, Творец, Свят Благословен Он — Зеир Арихович Анпин. Книга Элиягу Бар Малей, постраничный просмотр.">
<style>
  :root{
    --fg:#1a1a1a; --muted:#6b6258; --accent:#6b2d5c; --accent-soft:#8a4575;
    --bg:#f0ece2; --card:#fff; --border:#e0dbce; --bar:#fdfcf7;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;}
  body{
    background:var(--bg); color:var(--fg);
    font-family:Georgia,'Times New Roman',Times,serif;
    -webkit-font-smoothing:antialiased;
  }

  /* ── Top bar ─────────────────────────────── */
  .topbar{position:sticky; top:0; z-index:20;}
  .bar{
    display:flex; align-items:center; gap:.6rem;
    padding:.55rem .9rem; background:var(--bar);
    border-bottom:1px solid var(--border);
    box-shadow:0 1px 6px rgba(0,0,0,.05);
    font-family:'Helvetica Neue',Arial,sans-serif;
  }
  /* ── Find bar ────────────────────────────── */
  .findbar{
    display:flex; align-items:center; gap:.4rem;
    padding:.4rem .9rem; background:var(--bar);
    border-bottom:1px solid var(--border);
    box-shadow:0 1px 6px rgba(0,0,0,.05);
    font-family:'Helvetica Neue',Arial,sans-serif;
  }
  .findbar[hidden]{display:none;}
  .findbar input{
    flex:1; min-width:0; font:inherit; font-size:.92rem;
    border:1px solid var(--border); border-radius:6px; padding:.3rem .55rem;
    color:var(--fg); background:var(--card);
  }
  .findbar input:focus{outline:none; border-color:var(--accent);}
  .findbar .findstatus{
    font-size:.8rem; color:var(--muted); white-space:nowrap; min-width:3.5rem; text-align:right;
  }
  .findbar button{
    font:inherit; font-size:.9rem; cursor:pointer; color:var(--accent);
    background:var(--card); border:1px solid var(--border); border-radius:6px;
    width:1.9rem; height:1.9rem; line-height:1; padding:0;
    display:inline-flex; align-items:center; justify-content:center; flex:none;
  }
  .findbar button:hover{border-color:var(--accent);}
  .bar .home{
    color:var(--accent); text-decoration:none; font-size:1.1rem;
    line-height:1; padding:.2rem .35rem; border-radius:5px;
  }
  .bar .home:hover{background:rgba(107,45,92,.08);}
  .bar .title{
    flex:1; min-width:0; font-family:Georgia,serif; color:var(--accent);
    font-size:.98rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .bar .ctrl{display:flex; align-items:center; gap:.25rem;}
  .bar button{
    font:inherit; font-size:.9rem; cursor:pointer; color:var(--accent);
    background:var(--card); border:1px solid var(--border); border-radius:6px;
    width:1.9rem; height:1.9rem; line-height:1; padding:0;
    display:inline-flex; align-items:center; justify-content:center;
  }
  .bar button:hover{border-color:var(--accent);}
  .pageind{
    font-size:.82rem; color:var(--muted); white-space:nowrap;
    display:flex; align-items:center; gap:.2rem;
  }
  .pageind input{
    width:2.6rem; text-align:center; font:inherit; font-size:.82rem;
    border:1px solid var(--border); border-radius:5px; padding:.15rem .2rem;
    color:var(--fg); background:var(--card);
  }
  .bar .dl{
    color:var(--accent-soft); text-decoration:none; font-size:.8rem;
    letter-spacing:.03em; white-space:nowrap;
  }
  .bar .dl:hover{text-decoration:underline;}

  /* ── Pages ───────────────────────────────── */
  #viewer{
    padding:1.4rem .5rem 3rem; display:flex; flex-direction:column;
    align-items:center; gap:1.1rem;
  }
  .page{
    position:relative; background:var(--card); width:100%;
    box-shadow:0 2px 12px rgba(0,0,0,.12); overflow:hidden;
  }
  .page canvas{display:block; width:100%; height:100%;}
  .page .ph{
    position:absolute; inset:0; display:flex; align-items:center;
    justify-content:center; color:var(--muted); font-size:.85rem;
    font-family:'Helvetica Neue',Arial,sans-serif;
  }

  /* pdf.js text layer (selection) */
  .textLayer{
    position:absolute; inset:0; overflow:hidden; line-height:1;
    opacity:.25; mix-blend-mode:multiply;
  }
  .textLayer span, .textLayer br{
    color:transparent; position:absolute; white-space:pre;
    cursor:text; transform-origin:0 0;
  }
  .textLayer ::selection{background:rgba(107,45,92,.35);}

  /* clickable link annotations from the PDF */
  .linkLayer{position:absolute; inset:0; pointer-events:none;}
  .linkLayer a{position:absolute; display:block; cursor:pointer; pointer-events:auto;}
  .linkLayer a:hover{background:rgba(107,45,92,.13); outline:1px solid rgba(107,45,92,.45);}

  /* search highlights */
  .findLayer{position:absolute; inset:0; pointer-events:none;}
  .findLayer .fb{position:absolute; background:rgba(255,201,71,.5); mix-blend-mode:multiply; border-radius:2px;}
  .findLayer .fb.cur{background:rgba(255,138,46,.6);}

  .loading{
    text-align:center; color:var(--muted); padding:3rem 1rem;
    font-family:'Helvetica Neue',Arial,sans-serif; font-size:.9rem;
  }

  /* ── Table of contents drawer ────────────── */
  .bar .toc-toggle{
    width:auto; padding:0 .55rem; gap:.35rem; font-size:.82rem;
  }
  .bar .toc-toggle .lbl{ font-size:.8rem; }
  @media (max-width:560px){ .bar .toc-toggle .lbl{ display:none; } }
  #tocBack{
    position:fixed; inset:0; background:rgba(20,15,18,.4); z-index:30;
    opacity:0; pointer-events:none; transition:opacity .2s;
  }
  #tocBack.open{opacity:1; pointer-events:auto;}
  #toc{
    position:fixed; top:0; left:0; height:100%; width:min(400px,86vw);
    background:var(--bar); z-index:31; transform:translateX(-100%);
    transition:transform .22s ease; overflow-y:auto;
    box-shadow:2px 0 18px rgba(0,0,0,.22);
    font-family:'Helvetica Neue',Arial,sans-serif;
  }
  #toc.open{transform:none;}
  #toc .tochead{
    display:flex; align-items:center; justify-content:space-between;
    padding:.85rem 1rem; border-bottom:1px solid var(--border);
    position:sticky; top:0; background:var(--bar);
  }
  #toc .tochead span{ font-family:Georgia,serif; color:var(--accent); font-size:1rem; }
  #toc .tochead button{
    font:inherit; font-size:1.3rem; line-height:1; cursor:pointer;
    background:none; border:none; color:var(--muted); padding:.1rem .3rem;
  }
  #toc ul{list-style:none; margin:0; padding:.4rem 0 2rem;}
  #toc a{
    display:flex; gap:.5rem; align-items:baseline; justify-content:space-between;
    padding:.4rem 1rem; color:var(--fg); text-decoration:none;
    font-size:.92rem; line-height:1.3; border-left:3px solid transparent;
  }
  #toc a:hover{background:rgba(107,45,92,.08); color:var(--accent); border-left-color:var(--accent-soft);}
  #toc a .t{min-width:0;}
  #toc a .pg{color:var(--accent-soft); font-size:.74rem; white-space:nowrap; flex:none;}
  #toc .lvl1 a{padding-left:2rem; font-size:.86rem; color:var(--muted);}
  #toc .lvl2 a{padding-left:3rem; font-size:.83rem; color:var(--muted);}
  #toc .lvl1 a:hover, #toc .lvl2 a:hover{color:var(--accent);}
</style>
</head>
<body>
  <header class="topbar">
  <div class="bar">
    <a class="home" href="/" title="На главную">←</a>
    <button class="toc-toggle" id="tocToggle" title="Оглавление"><span>☰</span><span class="lbl">Оглавление</span></button>
    <span class="title">Я, Творец, Свят Благословен Он</span>
    <span class="pageind">
      <input id="pageInput" type="text" inputmode="numeric" value="1" aria-label="Номер страницы">
      <span>/ <span id="pageTotal">…</span></span>
    </span>
    <span class="ctrl">
      <button id="findToggle" title="Поиск (Ctrl+F)">🔍</button>
      <button id="zoomOut" title="Уменьшить">−</button>
      <button id="zoomIn" title="Увеличить">+</button>
    </span>
    <a class="dl" href="book.pdf" download title="Скачать PDF">PDF ↓</a>
  </div>
  <div class="findbar" id="findbar" hidden>
    <input id="findInput" type="text" placeholder="Поиск по книге…" aria-label="Поиск по книге">
    <span class="findstatus" id="findStatus"></span>
    <button id="findPrev" title="Предыдущее (Shift+Enter)">↑</button>
    <button id="findNext" title="Следующее (Enter)">↓</button>
    <button id="findClose" title="Закрыть (Esc)">×</button>
  </div>
  </header>

  <div id="tocBack"></div>
  <nav id="toc" aria-label="Оглавление">
    <div class="tochead"><span>Оглавление</span><button id="tocClose" title="Закрыть">×</button></div>
    <ul id="tocList"></ul>
  </nav>

  <div id="viewer"><div class="loading">Загрузка книги…</div></div>

  <script src="lib/pdf.min.js"></script>
  <script>
  (function(){
    const pdfjsLib = window['pdfjsLib'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'lib/pdf.worker.min.js';

    const viewer   = document.getElementById('viewer');
    const pageInput= document.getElementById('pageInput');
    const pageTotal= document.getElementById('pageTotal');
    const zoomIn   = document.getElementById('zoomIn');
    const zoomOut  = document.getElementById('zoomOut');
    const tocToggle= document.getElementById('tocToggle');
    const tocClose = document.getElementById('tocClose');
    const tocBack  = document.getElementById('tocBack');
    const tocPanel = document.getElementById('toc');
    const tocList  = document.getElementById('tocList');
    const findToggle = document.getElementById('findToggle');
    const findbar    = document.getElementById('findbar');
    const findInput  = document.getElementById('findInput');
    const findStatus = document.getElementById('findStatus');
    const findPrev   = document.getElementById('findPrev');
    const findNext   = document.getElementById('findNext');
    const findClose  = document.getElementById('findClose');

    let pdf = null;
    let numPages = 0;
    let pageDivs = [];          // .page wrappers
    let rendered = new Map();   // pageNum -> {task, rendering}
    let zoom = 1;               // user zoom multiplier on top of fit-width
    let baseViewport = null;    // page 1 viewport at scale 1 (pt)
    let renderToken = 0;        // invalidates in-flight renders on zoom

    const DPR = Math.min(window.devicePixelRatio || 1, 2);
    const RENDER_MARGIN = '800px 0px'; // render a bit before entering view

    function fitScale(){
      // viewer content width minus padding
      const avail = viewer.clientWidth - 16; // ~0.5rem*2 padding
      const w = Math.min(avail, 900);        // cap width on big screens
      return (w / baseViewport.width) * zoom;
    }

    function sizePlaceholder(div, scale){
      div.style.width  = (baseViewport.width  * scale) + 'px';
      div.style.height = (baseViewport.height * scale) + 'px';
    }

    function buildPlaceholders(){
      viewer.innerHTML = '';
      pageDivs = [];
      const scale = fitScale();
      for(let i=1;i<=numPages;i++){
        const div = document.createElement('div');
        div.className = 'page';
        div.dataset.page = i;
        sizePlaceholder(div, scale);
        const ph = document.createElement('div');
        ph.className = 'ph';
        ph.textContent = i;
        div.appendChild(ph);
        viewer.appendChild(div);
        pageDivs.push(div);
      }
    }

    async function renderPage(num){
      if(rendered.has(num)) return;
      const div = pageDivs[num-1];
      rendered.set(num, {});
      const myToken = renderToken;
      try{
        const page = await pdf.getPage(num);
        if(myToken !== renderToken){ rendered.delete(num); return; }
        const scale = fitScale();
        const viewport = page.getViewport({scale});
        div.style.setProperty('--scale-factor', scale);

        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d', {alpha:false});
        canvas.width  = Math.floor(viewport.width  * DPR);
        canvas.height = Math.floor(viewport.height * DPR);
        canvas.style.width  = '100%';
        canvas.style.height = '100%';

        const task = page.render({
          canvasContext: ctx,
          viewport,
          transform: DPR !== 1 ? [DPR,0,0,DPR,0,0] : null
        });
        rendered.set(num, {task});
        await task.promise;
        if(myToken !== renderToken){ rendered.delete(num); return; }

        // swap placeholder -> canvas (+ text layer)
        const ph = div.querySelector('.ph'); if(ph) ph.remove();
        div.appendChild(canvas);

        try{
          const textContent = await page.getTextContent();
          if(myToken !== renderToken) return;
          const tl = document.createElement('div');
          tl.className = 'textLayer';
          div.appendChild(tl);
          pdfjsLib.renderTextLayer({
            textContentSource: textContent,
            container: tl,
            viewport: viewport,
            textDivs: []
          });
        }catch(e){/* text layer optional */}

        // link annotations: external URLs (new tab) + internal jumps (our nav)
        try{
          const annots = await page.getAnnotations({intent:'display'});
          if(myToken !== renderToken) return;
          const links = annots.filter(a=>a.subtype==='Link' && (a.url || a.dest));
          if(links.length){
            const ll = document.createElement('div');
            ll.className = 'linkLayer';
            for(const a of links){
              const r = viewport.convertToViewportRectangle(a.rect);
              const el = document.createElement('a');
              el.style.left   = Math.min(r[0],r[2]) + 'px';
              el.style.top    = Math.min(r[1],r[3]) + 'px';
              el.style.width  = Math.abs(r[2]-r[0]) + 'px';
              el.style.height = Math.abs(r[3]-r[1]) + 'px';
              if(a.url){
                el.href = a.url; el.target = '_blank'; el.rel = 'noopener noreferrer';
                el.title = a.url;
              }else{
                el.href = '#';
                const dest = a.dest;
                el.addEventListener('click', async ev=>{
                  ev.preventDefault();
                  const pn = await destPageNum(dest);
                  if(pn) goToPage(pn);
                });
              }
              ll.appendChild(el);
            }
            div.appendChild(ll);
          }
        }catch(e){/* links optional */}
      }catch(err){
        rendered.delete(num);
        if(myToken === renderToken) console.warn('page '+num+' render failed', err);
      }
    }

    function freePage(num){
      const rec = rendered.get(num);
      if(!rec) return;
      if(rec.task && rec.task.cancel) try{ rec.task.cancel(); }catch(e){}
      const div = pageDivs[num-1];
      div.querySelectorAll('canvas, .textLayer, .linkLayer').forEach(n=>n.remove());
      if(!div.querySelector('.ph')){
        const ph=document.createElement('div'); ph.className='ph'; ph.textContent=num;
        div.appendChild(ph);
      }
      rendered.delete(num);
    }

    // Lazy render via IntersectionObserver
    let io;
    function observeAll(){
      if(io) io.disconnect();
      io = new IntersectionObserver((entries)=>{
        for(const e of entries){
          const num = +e.target.dataset.page;
          if(e.isIntersecting) renderPage(num);
          else freePageIfFar(num);
        }
      }, {root:null, rootMargin:RENDER_MARGIN, threshold:0});
      pageDivs.forEach(d=>io.observe(d));
    }

    // current page tracking (most visible)
    let currentPage = 1;
    let curObs;
    function observeCurrent(){
      if(curObs) curObs.disconnect();
      curObs = new IntersectionObserver((entries)=>{
        let best=null, bestRatio=0;
        for(const e of entries){
          if(e.intersectionRatio>bestRatio){bestRatio=e.intersectionRatio; best=+e.target.dataset.page;}
        }
        if(best && best!==currentPage){
          currentPage=best;
          if(document.activeElement!==pageInput) pageInput.value=best;
        }
      }, {root:null, threshold:[.1,.3,.5,.7]});
      pageDivs.forEach(d=>curObs.observe(d));
    }

    function freePageIfFar(num){
      // keep a window of pages around current to avoid re-render thrash
      if(Math.abs(num-currentPage) <= 3) return;
      freePage(num);
    }

    function goToPage(n){
      n = Math.max(1, Math.min(numPages, n|0));
      // smooth only for short hops; instant for long jumps (browsers bail on huge smooth scrolls)
      const behavior = Math.abs(n - currentPage) <= 4 ? 'smooth' : 'auto';
      pageDivs[n-1].scrollIntoView({behavior, block:'start'});
    }

    // ── Table of contents ──────────────────────
    function openToc(){ tocPanel.classList.add('open'); tocBack.classList.add('open'); }
    function closeToc(){ tocPanel.classList.remove('open'); tocBack.classList.remove('open'); }
    tocToggle.onclick = ()=> tocPanel.classList.contains('open') ? closeToc() : openToc();
    tocClose.onclick  = closeToc;
    tocBack.onclick   = closeToc;
    document.addEventListener('keydown', e=>{ if(e.key==='Escape') closeToc(); });

    async function destPageNum(dest){
      try{
        const explicit = typeof dest === 'string' ? await pdf.getDestination(dest) : dest;
        if(!explicit || !explicit[0]) return null;
        const idx = await pdf.getPageIndex(explicit[0]);
        return idx + 1;
      }catch(e){ return null; }
    }

    async function buildToc(){
      let outline = null;
      try{ outline = await pdf.getOutline(); }catch(e){}
      if(!outline || !outline.length){
        // no embedded outline → hide the control
        tocToggle.style.display = 'none';
        return;
      }
      const frag = document.createDocumentFragment();
      async function emit(items, lvl){
        for(const it of items){
          const li = document.createElement('li');
          if(lvl) li.className = 'lvl'+lvl;
          const a = document.createElement('a');
          a.href = '#';
          const title = (it.title || '').trim() || '—';
          const pn = await destPageNum(it.dest);
          const t = document.createElement('span'); t.className='t'; t.textContent = title;
          a.appendChild(t);
          if(pn){
            const pg = document.createElement('span'); pg.className='pg'; pg.textContent = pn;
            a.appendChild(pg);
            a.addEventListener('click', ev=>{ ev.preventDefault(); closeToc(); goToPage(pn); });
          }else{
            a.addEventListener('click', ev=>ev.preventDefault());
          }
          li.appendChild(a);
          frag.appendChild(li);
          if(it.items && it.items.length) await emit(it.items, Math.min((lvl||0)+1, 2));
        }
      }
      await emit(outline, 0);
      tocList.appendChild(frag);
    }

    // Zoom: re-size placeholders, drop renders, re-render visible
    let zoomTimer;
    function applyZoom(){
      renderToken++;                       // invalidate in-flight
      clearFindHighlights();
      const scale = fitScale();
      pageDivs.forEach(d=>sizePlaceholder(d, scale));
      // clear all current renders; observers will re-fire for visible
      Array.from(rendered.keys()).forEach(freePage);
      clearTimeout(zoomTimer);
      zoomTimer = setTimeout(()=>{ observeAll(); }, 60);
    }
    zoomIn.onclick  = ()=>{ zoom=Math.min(zoom*1.25, 4); applyZoom(); };
    zoomOut.onclick = ()=>{ zoom=Math.max(zoom/1.25, .5); applyZoom(); };

    pageInput.addEventListener('keydown', e=>{
      if(e.key==='Enter'){ goToPage(+pageInput.value); pageInput.blur(); }
    });
    pageInput.addEventListener('blur', ()=>{ pageInput.value=currentPage; });

    // re-fit on resize (debounced)
    let rzTimer;
    window.addEventListener('resize', ()=>{
      clearTimeout(rzTimer);
      rzTimer=setTimeout(applyZoom, 150);
    });

    // ── Full-text search (custom, bound to Ctrl+F) ──
    let pageText = null;        // 1..N whitespace-stripped lowercased page text
    let indexBuilding = null;
    let findMatches = [];       // [{page, count}]
    let findIdx = -1;
    let findQuery = '';

    // Whitespace-insensitive normalize: the PDF often splits a word into
    // several text items (e.g. B|NEI|A|DAM.COM), so stripping all whitespace
    // lets a query match across those fragments.
    function norm(s){ return (s||'').toLowerCase().replace(/\s+/g,''); }

    async function buildIndex(){
      if(pageText) return pageText;
      if(indexBuilding) return indexBuilding;
      indexBuilding = (async()=>{
        const arr = new Array(numPages+1).fill('');
        for(let i=1;i<=numPages;i++){
          try{
            const pg = await pdf.getPage(i);
            const tc = await pg.getTextContent();
            arr[i] = norm(tc.items.map(it=>it.str).join(''));
          }catch(e){ arr[i]=''; }
        }
        pageText = arr; return arr;
      })();
      return indexBuilding;
    }

    function countOcc(hay, needle){
      if(!needle) return 0;
      let n=0, i=0;
      while((i=hay.indexOf(needle,i))!==-1){ n++; i+=needle.length; }
      return n;
    }

    function clearFindHighlights(){ document.querySelectorAll('.findLayer').forEach(n=>n.remove()); }

    function setFindStatus(txt){ findStatus.textContent = txt; }

    async function runSearch(q){
      q = norm(q);
      findQuery = q;
      clearFindHighlights();
      if(!q){ findMatches=[]; findIdx=-1; setFindStatus(''); return; }
      setFindStatus('индексирую…');
      await buildIndex();
      if(q !== findQuery) return;           // superseded by newer query
      findMatches = []; let total = 0;
      for(let i=1;i<=numPages;i++){
        const c = countOcc(pageText[i], q);
        if(c>0){ findMatches.push({page:i,count:c}); total+=c; }
      }
      if(!findMatches.length){ findIdx=-1; setFindStatus('нет совпадений'); return; }
      window.__findTotal = total;
      gotoFindMatch(0);
    }

    function updateFindStatus(){
      if(findIdx<0){ return; }
      const p = findMatches[findIdx].page;
      setFindStatus(`${findIdx+1}/${findMatches.length} стр · ${window.__findTotal||''}`);
    }

    function gotoFindMatch(k){
      if(!findMatches.length) return;
      findIdx = (k % findMatches.length + findMatches.length) % findMatches.length;
      const page = findMatches[findIdx].page;
      updateFindStatus();
      goToPage(page);
      highlightWhenReady(page, findQuery);
    }

    async function highlightWhenReady(page, q){
      clearFindHighlights();
      const div = pageDivs[page-1];
      renderPage(page);                       // force render so text layer exists
      let tl=null;
      for(let t=0;t<80;t++){
        tl = div.querySelector('.textLayer');
        if(tl && tl.querySelector('span')) break;
        await new Promise(r=>setTimeout(r,80));
      }
      if(!tl || q!==findQuery || !q) return;
      const spans = [...tl.querySelectorAll('span')];
      // normalized concat of span texts + per-char map back to span index
      let concat = ''; const map = [];
      for(let j=0;j<spans.length;j++){
        const t = norm(spans[j].textContent);
        for(let k=0;k<t.length;k++) map.push(j);
        concat += t;
      }
      const fl = document.createElement('div'); fl.className='findLayer';
      let first=null, idx=0, marked=new Set();
      while((idx = concat.indexOf(q, idx)) !== -1){
        const sStart = map[idx], sEnd = map[idx + q.length - 1];
        for(let s=sStart; s<=sEnd; s++){
          const sp = spans[s];
          const b = document.createElement('div'); b.className='fb';
          b.style.left=sp.offsetLeft+'px'; b.style.top=sp.offsetTop+'px';
          b.style.width=sp.offsetWidth+'px'; b.style.height=sp.offsetHeight+'px';
          fl.appendChild(b);
          if(!first){ first=b; }
        }
        idx += q.length;
      }
      div.appendChild(fl);
      if(first){ first.classList.add('cur'); first.scrollIntoView({block:'center'}); }
    }

    // find UI wiring
    function openFind(){
      findbar.hidden = false;
      findInput.focus(); findInput.select();
    }
    function closeFind(){
      findbar.hidden = true;
      clearFindHighlights();
      findQuery=''; findMatches=[]; findIdx=-1;
    }
    findToggle.onclick = ()=> findbar.hidden ? openFind() : closeFind();
    findClose.onclick  = closeFind;
    findNext.onclick   = ()=> gotoFindMatch(findIdx+1);
    findPrev.onclick   = ()=> gotoFindMatch(findIdx-1);
    findInput.addEventListener('keydown', e=>{
      if(e.key==='Enter'){
        e.preventDefault();
        const v=norm(findInput.value);
        if(v && v===findQuery && findMatches.length){ gotoFindMatch(findIdx + (e.shiftKey?-1:1)); }
        else { runSearch(findInput.value); }
      }else if(e.key==='Escape'){ e.preventDefault(); closeFind(); }
    });
    // intercept the browser's Ctrl/Cmd+F
    document.addEventListener('keydown', e=>{
      if((e.ctrlKey||e.metaKey) && (e.key==='f'||e.key==='F' || e.key==='а'||e.key==='А')){
        e.preventDefault(); openFind();
      }
    });

    (async function init(){
      try{
        const task = pdfjsLib.getDocument({url:'book.pdf'});
        pdf = await task.promise;
        numPages = pdf.numPages;
        pageTotal.textContent = numPages;
        const p1 = await pdf.getPage(1);
        baseViewport = p1.getViewport({scale:1});
        buildPlaceholders();
        observeAll();
        observeCurrent();
        buildToc();
      }catch(err){
        viewer.innerHTML = '<div class="loading">Не удалось загрузить книгу.<br>'+
          '<a href="book.pdf" style="color:var(--accent)">Открыть PDF напрямую</a></div>';
        console.error(err);
      }
    })();
  })();
  </script>
</body>
</html>
